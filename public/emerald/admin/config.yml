# yaml-language-server: $schema=https://unpkg.com/decap-cms/dist/decap-cms.json

backend:
  name: git-gateway
  branch: main

media_folder: images/uploads
public_folder: /images/uploads

collections:
  - name: programme
    label: This week’s music
    files:
      - name: programme
        label: Programme & Tonight
        file: content/programme.json
        fields:
          - { label: Section eyebrow, name: eyebrow, widget: string }
          - { label: Section title, name: title, widget: string }
          - { label: Note under the list, name: note, widget: string }
          - {
              label: Tonight override,
              name: tonightOverride,
              widget: string,
              required: false,
              hint: "Blank = auto from today’s rows.",
            }
          - label: Weekly lineup
            name: lineup
            widget: list
            summary: "{{dayLabel}} · {{name}} · {{time}}"
            fields:
              - { label: Day of week (0=Sun…6=Sat), name: day, widget: number, value_type: int, min: 0, max: 6 }
              - { label: Day label, name: dayLabel, widget: string }
              - { label: Artist / event name, name: name, widget: string }
              - { label: Time, name: time, widget: string }
              - { label: Kind, name: kind, widget: select, options: [music, quiz, other], default: music }
              - { label: Header cue, name: cue, widget: string, required: false }
              - { label: Detail, name: detail, widget: string, required: false }
              - { label: Link target, name: href, widget: string, required: false, default: "#music" }
          - label: Board cards
            name: board
            widget: list
            required: false
            summary: "{{label}} · {{title}}"
            fields:
              - { label: Id, name: id, widget: string }
              - {
                  label: Active days,
                  name: days,
                  widget: string,
                  hint: "Comma-separated: 0=Sun … 6=Sat. Example: 0,3,4,5,6",
                }
              - { label: Label, name: label, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Detail, name: detail, widget: string }
              - { label: Link, name: href, widget: string, default: "#music" }
              - { label: Menu tab (optional), name: menuTab, widget: string, required: false }

  - name: menu
    label: Menu (light)
    files:
      - name: menu
        label: Light menu
        file: content/menu.json
        fields:
          - { label: Section eyebrow, name: eyebrow, widget: string }
          - { label: Section title, name: title, widget: string }
          - { label: Intro, name: intro, widget: text }
          - { label: Fee / service note, name: feeNote, widget: string, required: false }
          - label: Sections
            name: sections
            widget: list
            summary: "{{name}}"
            fields:
              - { label: Id, name: id, widget: string }
              - { label: Section name, name: name, widget: string }
              - label: Items
                name: items
                widget: list
                summary: "{{name}} · {{price}}"
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Description, name: description, widget: string, required: false }
                  - { label: Price, name: price, widget: string }
